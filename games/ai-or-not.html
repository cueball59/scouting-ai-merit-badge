<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AI or Not? Game</title>
  <script>
    (() => {
      const param = new URLSearchParams(window.location.search).get("scoutTheme");
      const theme =
        param || (window.matchMedia("(prefers-color-scheme: dark)").matches ? "dark" : "light");
      document.documentElement.setAttribute("data-theme", theme);
    })();
  </script>
  <link rel="stylesheet" href="../styles.css">
</head>
<body data-page="ai-game" data-base="../">
  <header class="site-header">
    <a class="brand" href="../index.html" aria-label="AI Merit Badge home">
      <img src="../assets/scouting-america-logo.png" alt="Scouting America logo">
      <span>AI Merit Badge</span>
    </a>
    <nav id="site-nav" class="site-nav" aria-label="Primary"></nav>
  </header>
  <main id="app" class="site-main"></main>
  <footer id="site-footer" class="site-footer"></footer>
  <script src="../data.js"></script>
  <script src="../app.js"></script>
</body>
</html>
