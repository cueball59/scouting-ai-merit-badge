name: Refresh AI News

on:
  schedule:
    - cron: "15 10 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Refresh AI news data
        run: node scripts/update-ai-news.js
      - name: Commit changes
        run: |
          if git diff --quiet data/ai-news.json; then
            echo "No AI news changes"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/ai-news.json
          git commit -m "Refresh AI news"
          git push
